name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18.x'

jobs:
  # Lint and format check
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies (server)
        run: |
          cd server
          npm ci
      
      - name: Install dependencies (frontend)
        run: npm ci
      
      - name: Run ESLint (server)
        run: |
          cd server
          npm run lint || echo "Lint script not configured yet"
      
      - name: Run ESLint (frontend)
        run: npm run lint

  # Backend tests
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          cd server
          npm ci
      
      - name: Run tests
        env:
          MONGODB_URI: mongodb://localhost:27017/expense-tracker-test
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test
        run: |
          cd server
          npm test || echo "Tests not configured yet"
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          directory: ./server/coverage
          flags: backend

  # Frontend build test
  test-frontend:
    name: Frontend Build Test
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api-placeholder.com
      
      - name: Run tests
        run: npm test || echo "Tests not configured yet"

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Security audit (backend)
        run: |
          cd server
          npm audit --audit-level=moderate || true
      
      - name: Security audit (frontend)
        run: npm audit --audit-level=moderate || true

  # Deploy to Render (backend)
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [test-backend, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Trigger Render deployment
        run: |
          echo "Backend deployment triggered automatically by Render"
          echo "Monitor deployment at: https://dashboard.render.com"

  # Deploy to Vercel (frontend)
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [test-frontend, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Trigger Vercel deployment
        run: |
          echo "Frontend deployment triggered automatically by Vercel"
          echo "Monitor deployment at: https://vercel.com/dashboard"

  # Notification
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy-backend.result }}" == "success" ] && [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed or skipped"
          fi
