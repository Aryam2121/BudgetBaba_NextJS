services:
  # Backend API Service
  - type: web
    name: expense-tracker-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false
        # Set to your Vercel frontend, e.g. https://budgetbaba.vercel.app
      - key: BACKEND_URL
        value: https://budgetbaba-nextjs.onrender.com
    healthCheckPath: /api/health
    autoDeploy: true

  # Optional: Static site for frontend (if you want to deploy frontend separately)
