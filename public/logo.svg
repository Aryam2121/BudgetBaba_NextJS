<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Wisdom Theme -->
  <circle cx="60" cy="60" r="60" fill="url(#gradient)" />
  
  <!-- Wise Character Silhouette -->
  <circle cx="60" cy="45" r="18" fill="white" fill-opacity="0.95" />
  
  <!-- Mustache (Baba Style) -->
  <path d="M45 50C48 52 52 52 55 50C55 50 57 52 60 52C63 52 65 50 65 50C68 52 72 52 75 50" 
        stroke="#8B5CF6" 
        stroke-width="3" 
        stroke-linecap="round" 
        fill="none" />
  
  <!-- Eyes -->
  <circle cx="54" cy="42" r="2" fill="#1F2937" />
  <circle cx="66" cy="42" r="2" fill="#1F2937" />
  
  <!-- Wise Cap/Turban -->
  <path d="M42 35C42 25 50 20 60 20C70 20 78 25 78 35L75 40L45 40Z" 
        fill="#8B5CF6" 
        fill-opacity="0.9" />
  
  <!-- Money/Coins floating around -->
  <circle cx="30" cy="30" r="6" fill="#F59E0B" fill-opacity="0.8" />
  <text x="30" y="34" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">₹</text>
  
  <circle cx="90" cy="35" r="6" fill="#F59E0B" fill-opacity="0.8" />
  <text x="90" y="39" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">$</text>
  
  <circle cx="25" cy="85" r="6" fill="#F59E0B" fill-opacity="0.8" />
  <text x="25" y="89" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">€</text>
  
  <!-- Ledger/Book -->
  <rect x="35" y="70" width="50" height="35" rx="4" fill="white" fill-opacity="0.95" stroke="#8B5CF6" stroke-width="2" />
  <line x1="40" y1="78" x2="75" y2="78" stroke="#8B5CF6" stroke-width="1.5" />
  <line x1="40" y1="85" x2="70" y2="85" stroke="#10B981" stroke-width="1.5" />
  <line x1="40" y1="92" x2="80" y2="92" stroke="#EF4444" stroke-width="1.5" />
  <line x1="40" y1="99" x2="65" y2="99" stroke="#8B5CF6" stroke-width="1.5" />
  
  <!-- Wisdom Sparkles -->
  <path d="M95 70L97 72L95 74L93 72Z" fill="#F59E0B" />
  <path d="M20 60L22 62L20 64L18 62Z" fill="#F59E0B" />
  <path d="M85 90L87 92L85 94L83 92Z" fill="#F59E0B" />
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>