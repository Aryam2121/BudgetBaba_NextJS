  <circle cx="106" cy="362" r="25" fill="#F59E0B" fill-opacity="0.9" stroke="#D97706" stroke-width="2" />
  <text x="106" y="374" text-anchor="middle" font-family="Arial" font-size="24" fill="white" font-weight="bold">€</text>
  
  <circle cx="406" cy="362" r="25" fill="#F59E0B" fill-opacity="0.9" stroke="#D97706" stroke-width="2" />
  <text x="406" y="374" text-anchor="middle" font-family="Arial" font-size="24" fill="white" font-weight="bold">¥</text>
  
