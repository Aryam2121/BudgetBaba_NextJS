  <!-- Book Lines -->
  <line x1="170" y1="332" x2="320" y2="332" stroke="#8B5CF6" stroke-width="6" />
  <line x1="170" y1="362" x2="298" y2="362" stroke="#10B981" stroke-width="6" />
